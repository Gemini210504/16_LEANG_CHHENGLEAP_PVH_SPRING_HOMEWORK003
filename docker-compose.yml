services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1127" # Use quotes for numbers to be safe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Spring Boot API Service
  api:
    build: .
    container_name: spring_api
    ports:
      - "8080:8080"
    environment:
      # These must match the ${VARIABLES} in your application.properties
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/events
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "1127"
    depends_on:
      - db

volumes:
  postgres_data: